<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surti Keyword Backend</title>
<style>
  body{font-family:-apple-system,sans-serif;background:#0a0a0b;color:#e8e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .box{text-align:center;padding:40px;}
  h1{color:#d4a847;font-size:24px;margin-bottom:8px;}
  p{color:#8888a0;font-size:14px;line-height:1.6;}
  code{background:#1e1e23;padding:3px 8px;border-radius:5px;color:#2dd4bf;font-size:13px;}
  .ok{color:#2dd4bf;margin-top:20px;font-size:13px;}
</style>
</head>
<body>
<div class="box">
  <h1>Surti Keyword Backend</h1>
  <p>This server is running and ready.</p>
  <p>Test it: <code>/api/keywords?q=dog treats</code></p>
  <div class="ok">Status: Active</div>
</div>
</body>
</html>
